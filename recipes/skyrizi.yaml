# Skyrizi Complete Savings Card — AbbVie patient enrollment recipe.
#
# Mapped against the live form (AEM Adaptive Form) on 2026-06-18. The whole wizard
# lives in one DOM with hidden duplicate copies of every field, shown one step at a
# time; the runner filters every locator to visible.
#
# Targeting: text inputs and the state <select> have clean, stable `name` attributes
# (used directly). Radios have auto-generated names, so they are clicked by visible
# label text via label_map. The runner enters text with real key events
# (pressSequentially) — programmatic .value/.fill is silently rejected by the form's
# validator.
#
# IMPORTANT: the email field rejects "+", so test addresses use Gmail's dot trick
# (see src/patient/testEmail.ts), not plus-aliasing.

drug: skyrizi
manufacturer: abbvie
url: https://www.skyrizi.com/skyrizi-complete/enrollment
form_type: aem_adaptive_form_spa

interaction:
  target_by: label_text
  events: [input, change, blur]
  verify_field_state: true

preflight:
  - dismiss_cookie_banner
  - dismiss_chat_widget

eligibility:
  required_insurance: commercial
  disqualifying: [medicare, medicaid, tricare, va]
  gate_step: savings
  insurance_field_key: insurance_type

steps:
  # ---- Step 1: Account ----
  - id: account
    title: Account
    mapped: true
    signature: "Email Address"
    fields:
      - key: diagnosis
        type: radio
        notes: Single-select radio group (auto-generated name); click by label text.
        label_map:
          plaque_psoriasis: "I am diagnosed with Moderate to Severe Plaque Psoriasis"
          psoriatic_arthritis: "I am diagnosed with Active Psoriatic Arthritis"
          crohns: "I am diagnosed with Moderate to Severe Crohn's Disease"
          ulcerative_colitis: "I am diagnosed with Moderate to Severe Ulcerative Colitis"
      - key: first_name
        type: text
        name: AccfirstName
        label: "First Name"
      - key: last_name
        type: text
        name: AccountlastName
        label: "Last Name"
      - key: email
        type: email
        name: emailAdrress
        label: "Email Address"
        notes: Rejects "+". Used to create the account + deliver the digital card.
    advance:
      button: "Continue"

  # ---- Step 2: Treatment ----
  - id: treatment
    title: Treatment
    mapped: true
    signature: "Have you started SKYRIZI treatment"
    notes: >-
      "started" drives conditional fields. "no" reveals a required upcoming-treatment
      date; "yes" reveals recent-treatment date/type (not modeled in v1).
    fields:
      - key: treatment.started
        type: radio
        label_map:
          "yes": "Yes"
          "no": "No"
          "unsure": "Unsure"
      - key: treatment.upcoming_date
        type: date
        name: noUpcomingTreatment
        label: "When is your upcoming treatment?"
        required: false
        notes: Required by the form only when started = "no".
    advance:
      button: "Continue"

  # ---- Step 3: Profile ----
  - id: profile
    title: Profile
    mapped: true
    signature: "Date of Birth"
    fields:
      - key: date_of_birth
        type: date
        name: dob
        label: "Date of Birth"
      - key: sex
        type: radio
        label_map:
          male: "Male"
          female: "Female"
      - key: address.zip
        type: text
        name: zipcode
        label: "ZIP Code"
        notes: Profile ZIP; the Savings mailing-address ZIP auto-populates from this.
      - key: phone
        type: tel
        name: phoneNumber
        label: "Primary Phone"
    advance:
      button: "Continue"

  # ---- Step 4: Savings (eligibility gate + mailing address) ----
  - id: savings
    title: Savings
    mapped: true
    signature: "I don't have insurance"
    notes: >-
      Insurance type is the eligibility gate (commercial only). Selecting commercial
      reveals the mailing address. The address ZIP is disabled/auto-populated from the
      Profile ZIP, so it is not listed here.
    fields:
      - key: insurance_type
        type: radio
        label_map:
          commercial: "I have private or commercial insurance from my employer or family member"
          medicare: "I'm on Medicare (including Advantage and Supplemental Plans)"
          medicaid: "I have a government-funded, Medicaid, or VA insurance plan"
          va: "I have a government-funded, Medicaid, or VA insurance plan"
          tricare: "I have a government-funded, Medicaid, or VA insurance plan"
          other: "I don't have insurance"
      - key: address.line1
        type: text
        name: streetAddressTextbox
        label: "Street Address"
        conditional: true
      - key: address.line2
        type: text
        name: streetAddress2Textbox
        label: "Street Address 2"
        required: false
        conditional: true
      - key: address.city
        type: text
        name: cityTextbox
        label: "City"
        conditional: true
      - key: address.state
        type: select
        name: stateDropdown
        label: "State"
        conditional: true
        notes: Native <select>; option value is the 2-letter code (e.g. OH). Revealed after commercial insurance is chosen.
    advance:
      button: "Continue"

  # ---- Step 5: Confirm (the only irreversible step) ----
  - id: confirm
    title: Confirm
    mapped: true
    notes: >-
      Review step. SUBMIT CANNOT BE AUTOMATED here, by design of the site:
        1. checkbox `marketingnews1` is REQUIRED — "I consent to the collection, use, and
           disclosure of my health-related personal data ... for online targeted
           advertising". This is the deferred consent/authorization; the runner does NOT
           auto-check it (it is a patient decision).
        2. The step is protected by invisible reCAPTCHA Enterprise (anti-bot).
      `marketingnews` (optional) is SMS marketing consent — left unchecked.
      So v1 fills through here and STOPS (ready_to_submit); a human gives consent, clears
      the CAPTCHA, and clicks Submit. No fields are auto-filled on this step.
    fields: []
    advance:
      button: "Submit"
      irreversible: true

success_signal:
  type: url_redirect
  match: /skyrizi-complete/signup/confirmation
