# Skyrizi Complete Savings Card — AbbVie patient enrollment recipe.
#
# Generated by mapping the live form (src/mapper) and checked in. The deterministic
# runner executes this per patient. Steps 2–5 are STUBS until the live mapping pass
# fills them — see `mapped: false`. Do not run a full enrollment until they're mapped.
#
# Locate fields by label text, never by CSS class (classes are auto-generated/brittle).

drug: skyrizi
manufacturer: abbvie
url: https://www.skyrizi.com/skyrizi-complete/enrollment
form_type: custom_component_spa

interaction:
  target_by: label_text
  events: [input, change, blur]
  verify_field_state: true

preflight:
  - dismiss_cookie_banner
  - dismiss_chat_widget

eligibility:
  required_insurance: commercial
  disqualifying: [medicare, medicaid, tricare, va]
  gate_step: savings
  insurance_field_key: insurance_type

steps:
  # ---- Step 1: Account (fully mapped from spec) ----
  - id: account
    title: Account
    mapped: true
    fields:
      - key: diagnosis
        type: radio
        notes: Exactly one diagnosis. Patient enum -> visible option text.
        label_map:
          plaque_psoriasis: "I am diagnosed with Moderate to Severe Plaque Psoriasis"
          psoriatic_arthritis: "I am diagnosed with Active Psoriatic Arthritis"
          crohns: "I am diagnosed with Moderate to Severe Crohn's Disease"
          ulcerative_colitis: "I am diagnosed with Moderate to Severe Ulcerative Colitis"
      - key: first_name
        type: text
        label: "First Name"
      - key: last_name
        type: text
        label: "Last Name"
      - key: email
        type: email
        label: "Email Address"
        notes: Used to create the account and deliver the digital card.
    advance:
      button: "Continue"

  # ---- Step 2: Treatment (STUB — map me) ----
  - id: treatment
    title: Treatment
    mapped: false
    notes: >-
      Likely whether already prescribed/taking Skyrizi + prescribing details.
      Map with native event dispatch; record labels, types, validation cues.
    fields: []
    advance:
      button: "Continue"

  # ---- Step 3: Profile (STUB — map me) ----
  - id: profile
    title: Profile
    mapped: false
    notes: Likely date of birth, mailing address, phone.
    fields: []
    advance:
      button: "Continue"

  # ---- Step 4: Savings (STUB — map me; contains the eligibility gate) ----
  - id: savings
    title: Savings
    mapped: false
    notes: >-
      Collects insurance type (employer/commercial, Medicare, Medicaid, VA).
      Commercial-only; government insurance is disqualifying by law. The runner
      enforces the eligibility gate here before advancing.
    fields: []
    advance:
      button: "Continue"

  # ---- Step 5: Confirm (STUB — map me; the only irreversible action) ----
  - id: confirm
    title: Confirm
    mapped: false
    notes: Review + final submit. The ONLY irreversible step.
    fields: []
    advance:
      button: "Submit"
      irreversible: true

success_signal:
  type: url_redirect
  match: /skyrizi-complete/signup/confirmation
